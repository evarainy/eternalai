contract_id: http.api.public.v1
version: v1
status: draft
owner_service: services/api
consumers:
  - apps/web
  - apps/miniapp
  - internal_automation_clients
route_groups:
  - name: system
    prefix: /
  - name: public_v1
    prefix: /v1

endpoints:
  - operation_id: getApiHealth
    implementation_status: implemented
    method: GET
    path: /health
    auth: none
    request:
      body: null
    responses:
      "200":
        description: API service is healthy
        body:
          type: object
          required:
            - status
            - service
            - environment
          properties:
            status:
              type: string
              const: ok
            service:
              type: string
              const: api
            environment:
              type: string

  - operation_id: createSession
    implementation_status: implemented
    method: POST
    path: /v1/sessions
    auth: review_required
    request:
      body:
        schema_ref: services.api.app.schemas.session.CreateSessionRequest
        type: object
        required:
          - channel
        properties:
          channel:
            type: string
            enum:
              - web
              - miniapp
              - api
          title:
            type: string
          metadata:
            type: object
    responses:
      "201":
        description: Session created
        body:
          schema_ref: services.api.app.schemas.session.CreateSessionResponse
          type: object
          required:
            - session_id
            - channel
            - status
            - created_at
            - updated_at
          properties:
            session_id:
              type: string
            channel:
              type: string
              enum:
                - web
                - miniapp
                - api
            status:
              type: string
              const: active
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            title:
              type: string
            metadata:
              type: object
      "400":
        description: Invalid session payload
        body:
          schema_ref: services.api.app.schemas.common.BadRequestErrorResponse
          type: object
          required:
            - error
          properties:
            error:
              type: object
              required:
                - code
                - message
              properties:
                code:
                  type: string
                  const: invalid_request
                message:
                  type: string
                details:
                  type: object

  - operation_id: getSession
    implementation_status: implemented
    method: GET
    path: /v1/sessions/{session_id}
    auth: review_required
    path_params:
      - name: session_id
        type: string
    request:
      body: null
    responses:
      "200":
        description: Session details
        body:
          schema_ref: services.api.app.schemas.session.GetSessionResponse
          type: object
          required:
            - session_id
            - channel
            - status
            - created_at
            - updated_at
            - turns
          properties:
            session_id:
              type: string
            channel:
              type: string
              enum:
                - web
                - miniapp
                - api
            status:
              type: string
              enum:
                - active
                - archived
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            title:
              type: string
            metadata:
              type: object
            turns:
              type: array
              items:
                type: object
                required:
                  - turn_id
                  - session_id
                  - user_input_type
                  - user_input_text
                  - task_id
                  - status
                  - created_at
                properties:
                  turn_id:
                    type: string
                  session_id:
                    type: string
                  user_input_type:
                    type: string
                    enum:
                      - text
                      - audio
                  user_input_text:
                    type: string
                  task_id:
                    type: string
                  status:
                    type: string
                    enum:
                      - accepted
                      - processing
                      - completed
                      - failed
                  created_at:
                    type: string
                    format: date-time
                  assistant_output_text:
                    type: string
                  citations:
                    type: array
                    items:
                      type: object
                      required:
                        - source_id
                        - snippet
                      properties:
                        source_id:
                          type: string
                        snippet:
                          type: string
                        locator:
                          type: string
                  transcript_text:
                    type: string
                  failure_reason:
                    type: string
      "404":
        description: Session not found
        body:
          schema_ref: services.api.app.schemas.common.NotFoundErrorResponse
          type: object
          required:
            - error
          properties:
            error:
              type: object
              required:
                - code
                - message
                - resource
              properties:
                code:
                  type: string
                  const: not_found
                message:
                  type: string
                resource:
                  type: string
                resource_id:
                  type: string

  - operation_id: submitMessage
    implementation_status: implemented
    method: POST
    path: /v1/sessions/{session_id}/messages
    auth: review_required
    path_params:
      - name: session_id
        type: string
    request:
      body:
        schema_ref: services.api.app.schemas.message.SubmitMessageRequest
        type: object
        required:
          - input_type
        properties:
          input_type:
            type: string
            enum:
              - text
              - audio
          text:
            type: string
          audio_ref:
            type: string
          language_hint:
            type: string
    responses:
      "202":
        description: Message accepted for asynchronous processing
        body:
          schema_ref: services.api.app.schemas.message.SubmitMessageResponse
          type: object
          required:
            - task_id
            - status
            - accepted_turn_id
          properties:
            task_id:
              type: string
            status:
              type: string
              const: queued
            accepted_turn_id:
              type: string
      "400":
        description: Invalid input payload
        body:
          schema_ref: services.api.app.schemas.common.BadRequestErrorResponse
          type: object
          required:
            - error
          properties:
            error:
              type: object
              required:
                - code
                - message
              properties:
                code:
                  type: string
                  const: invalid_request
                message:
                  type: string
                details:
                  type: object
      "404":
        description: Session not found
        body:
          schema_ref: services.api.app.schemas.common.NotFoundErrorResponse
          type: object
          required:
            - error
          properties:
            error:
              type: object
              required:
                - code
                - message
                - resource
              properties:
                code:
                  type: string
                  const: not_found
                message:
                  type: string
                resource:
                  type: string
                resource_id:
                  type: string

  - operation_id: getTask
    implementation_status: implemented
    method: GET
    path: /v1/tasks/{task_id}
    auth: review_required
    path_params:
      - name: task_id
        type: string
    request:
      body: null
    responses:
      "200":
        description: Task state
        body:
          schema_ref: services.api.app.schemas.task.GetTaskResponse
          type: object
          required:
            - task_id
            - task_type
            - status
            - created_at
            - updated_at
          properties:
            task_id:
              type: string
            task_type:
              type: string
            status:
              type: string
              enum:
                - queued
                - running
                - succeeded
                - failed
                - canceled
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            session_id:
              type: string
            knowledge_source_id:
              type: string
            result_summary:
              type: string
            result:
              type: object
            error:
              type: object
              required:
                - code
                - message
              properties:
                code:
                  type: string
                message:
                  type: string
      "404":
        description: Task not found
        body:
          schema_ref: services.api.app.schemas.common.NotFoundErrorResponse
          type: object
          required:
            - error
          properties:
            error:
              type: object
              required:
                - code
                - message
                - resource
              properties:
                code:
                  type: string
                  const: not_found
                message:
                  type: string
                resource:
                  type: string
                resource_id:
                  type: string

  - operation_id: registerKnowledgeSource
    implementation_status: planned
    method: POST
    path: /v1/knowledge-sources
    auth: review_required
    request:
      body:
        schema_ref: services.api.app.schemas.knowledge_source.RegisterKnowledgeSourceRequest
        type: object
        required:
          - source_type
          - source_locator
        properties:
          source_type:
            type: string
            enum:
              - url
              - file
              - wiki
          source_locator:
            type: string
          display_name:
            type: string
    responses:
      "202":
        description: Knowledge source accepted and queued for ingestion
        body:
          schema_ref: services.api.app.schemas.knowledge_source.RegisterKnowledgeSourceResponse
          type: object
          required:
            - knowledge_source_id
            - task_id
            - status
            - source_type
            - source_locator
            - created_at
          properties:
            knowledge_source_id:
              type: string
            task_id:
              type: string
            status:
              type: string
              const: queued
            source_type:
              type: string
              enum:
                - url
                - file
                - wiki
            source_locator:
              type: string
            created_at:
              type: string
              format: date-time
            display_name:
              type: string
      "400":
        description: Invalid knowledge-source payload
        body:
          schema_ref: services.api.app.schemas.common.BadRequestErrorResponse
          type: object
          required:
            - error
          properties:
            error:
              type: object
              required:
                - code
                - message
              properties:
                code:
                  type: string
                  const: invalid_request
                message:
                  type: string
                details:
                  type: object

  - operation_id: getKnowledgeSource
    implementation_status: planned
    method: GET
    path: /v1/knowledge-sources/{knowledge_source_id}
    auth: review_required
    path_params:
      - name: knowledge_source_id
        type: string
    request:
      body: null
    responses:
      "200":
        description: Knowledge source details
        body:
          schema_ref: services.api.app.schemas.knowledge_source.GetKnowledgeSourceResponse
          type: object
          required:
            - knowledge_source_id
            - source_type
            - source_locator
            - status
            - created_at
          properties:
            knowledge_source_id:
              type: string
            source_type:
              type: string
              enum:
                - url
                - file
                - wiki
            source_locator:
              type: string
            status:
              type: string
              enum:
                - draft
                - queued
                - ingesting
                - ready
                - failed
                - disabled
            created_at:
              type: string
              format: date-time
            display_name:
              type: string
            last_ingested_at:
              type: string
              format: date-time
            failure_reason:
              type: string
      "404":
        description: Knowledge source not found
        body:
          schema_ref: services.api.app.schemas.common.NotFoundErrorResponse
          type: object
          required:
            - error
          properties:
            error:
              type: object
              required:
                - code
                - message
                - resource
              properties:
                code:
                  type: string
                  const: not_found
                message:
                  type: string
                resource:
                  type: string
                resource_id:
                  type: string
