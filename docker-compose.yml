# Bootstrap-only compose file for EternalAI.
# This reserves base infra and service slots without claiming that
# business workflows or observability integrations are fully wired.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eternalai
      POSTGRES_USER: eternalai
      POSTGRES_PASSWORD: eternalai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    env_file:
      - .env.example
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: deploy/docker/worker.Dockerfile
    env_file:
      - .env.example
    depends_on:
      - postgres
      - redis

  asr:
    build:
      context: .
      dockerfile: deploy/docker/asr.Dockerfile
    env_file:
      - .env.example
    ports:
      - "8010:8010"

volumes:
  postgres_data:
