summary: >
  Created docs/phase0/SDUI_RENDERER_ARCHITECTURE_BASELINE.md as the PDR-style
  architecture baseline for the future SDUI Renderer. Defines ComponentRegistry
  (static registration metadata only), ActionDispatcher (structured intent
  forwarding only), FallbackRenderer (safe fallback for unknown cards),
  schema_version strategy (required, compatibility-checked, rejected if
  unsupported/malformed), user_action boundary (single structured actions,
  no direct business execution), security and sensitive data boundary, frontend
  state and API boundary (Zustand for local UI, TanStack Query for server
  data, Orval for generated clients), alternatives considered, risks, and
  minimal architecture acceptance checks. Registered in MANIFEST.md. No
  web/src/sdui/** code created. No dependencies or lockfiles changed. No
  forbidden paths modified.

