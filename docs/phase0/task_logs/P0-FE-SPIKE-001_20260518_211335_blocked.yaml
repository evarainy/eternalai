summary: >
  @ant-design/x compatibility spike blocked. Registry investigation found no
  approved enterprise npm mirror or offline cache configured in the environment
  (repo .npmrc: absent, user .npmrc: absent, builtin .npmrc: npmjs.org default
  only, no NPM_CONFIG_REGISTRY or related env vars set). Public npmjs.org
  metadata (non-authoritative reference) shows @ant-design/x v1.0.0–v1.6.1
  declares antd peerDep >=5.0.0 or ^5.20.3 with react >=18.0.0, which is
  compatible with the frozen baseline (Ant Design 5.x + React 18). However,
  the entire v2.x line (2.0.0–2.7.0) requires antd ^6.0.0+, making it
  incompatible with the frozen Ant Design 5.x baseline. Enterprise mirror/cache
  availability is a blocking requirement per dependency_policy.md and cannot be
  proven with public npmjs.org results. Decision: blocked.

decision: "blocked"
decision_rationale: >
  Primary blocker: no approved enterprise npm mirror or approved offline cache
  is configured in this environment. The dependency_policy.md requires
  "Use only internal mirrors or approved offline caches supplied by the
  internal environment/package administrator." Public npmjs.org metadata
  cannot satisfy this requirement.
  Secondary finding: even if a mirror were available, @ant-design/x v2.x
  (the active development line) requires antd ^6.0.0+, which is incompatible
  with the frozen Ant Design 5.x baseline. Only the legacy v1.x line
  (latest: v1.6.1, peerDep antd ^5.20.3, react >=18.0.0) would be compatible.
  Recommendation for P0-INFRA-003A: do not add @ant-design/x to the npm
  allowlist until (1) enterprise mirror/cache availability is confirmed, and
  (2) a decision is made on whether to use the legacy v1.6.1 line or upgrade
  the frozen baseline to Ant Design 6.x.

