summary: >
  Established the Phase 0 single-node Docker Compose placeholder baseline.
  Created docker-compose.yml with three parse-only profiles (core-infra, app,
  observability) defining six services (postgres, redis, api, frontend,
  langfuse, otel-collector). Added a minimal OTLP Collector config skeleton,
  updated .env.example with four required variable groups, and created
  README.md with a Docker Compose profiles section. All validation is
  parse-only via docker compose config; no containers were started and no
  runtime readiness is claimed.

