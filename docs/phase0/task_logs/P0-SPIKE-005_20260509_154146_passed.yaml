summary: >
  完成泛微 e-cology 9、用友 U8+、海康 iVMS 三个目标业务系统的 API 类型、认证机制、
  权限边界、身份绑定需求、Credential Vault 需求和 Mock Adapter 形态的初步探查。
  产出三份 ADR 和三份研究笔记。所有无法从公开资料确认的结论均标记为 needs_vendor_confirmation，
  未编造任何结论，未连接任何生产系统。无公开可复核 URL 的 evidence_tier 已降级。

