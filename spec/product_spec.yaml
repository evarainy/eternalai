product:
  name: EternalAI
  revision: phase0-2026-04-20
  repository_stage: development_repo_scaffold
  business_direction: enterprise intranet assistant
  intent: >
    Provide a thin but real internal assistant workflow for text and audio questions,
    grounded answers, and explicit asynchronous task tracking.

baseline_runtime:
  host_runtime:
    venv_available: true
    python_version: "3.12.10"
    pytest_passed: true
    api_health_verified: true
  docker_runtime:
    verified: false

actors:
  - id: employee_user
    goal: Ask a question and receive a grounded answer
    channels:
      - web
      - miniapp
  - id: knowledge_operator
    goal: Register and refresh approved knowledge sources
    channels:
      - api
  - id: platform_maintainer
    goal: Operate services, queues, and verification flows
    channels:
      - scripts
      - ci
      - compose

phase_1_scope:
  included_capabilities:
    - session lifecycle management
    - text question submission
    - audio-question transcription through ASR
    - asynchronous answer and ingestion jobs
    - knowledge-source registration and ingestion state tracking
    - public API and internal contract versioning
  excluded_capabilities:
    - enterprise SSO
    - realtime streaming transport
    - full Langfuse deployment
    - mandatory Docker-first development
    - broad multi-tenant isolation

service_allocation:
  api:
    existing_paths:
      - services/api/app/main.py
      - services/api/tests/test_health.py
    phase_1_responsibilities:
      - own public HTTP contract
      - persist sessions, messages, tasks, and knowledge-source metadata
      - publish worker jobs
      - bridge audio requests to ASR through internal contracts
  worker:
    existing_paths:
      - services/worker/app/main.py
      - services/worker/tests/test_worker_bootstrap.py
    phase_1_responsibilities:
      - run answer and ingestion jobs
      - update task status transitions
      - isolate retryable background execution
  asr:
    existing_paths:
      - services/asr/app/main.py
      - services/asr/tests/test_asr_bootstrap.py
    phase_1_responsibilities:
      - expose transcription capability
      - hide provider choice behind an adapter
      - return normalized transcript payloads
  clients:
    existing_paths:
      - apps/web
      - apps/miniapp
    phase_1_responsibilities:
      - create sessions
      - submit text or audio questions
      - poll task status
      - render final answer payloads

core_resources:
  - session
  - conversation_turn
  - assistant_task
  - knowledge_source
  - transcription_request

quality_attributes:
  - name: contract_first
    rule: No new route or event is merged without a matching YAML contract
  - name: host_first_verification
    rule: Host `.venv` and pytest path remain supported
  - name: durable_state
    rule: Postgres is the source of truth for assistant state
  - name: async_isolation
    rule: Long-running work runs outside request handlers

open_review_gates:
  - id: gate-auth-mode
    question: Which authentication mode replaces bootstrap `AUTH_MODE=disabled`?
  - id: gate-primary-client
    question: Which client ships first, web or miniapp?
  - id: gate-knowledge-formats
    question: Which knowledge-source formats are in scope for the first ingestion slice?
  - id: gate-audio-retention
    question: Do we persist raw audio or only transcript text and metadata?
