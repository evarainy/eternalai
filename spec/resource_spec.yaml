resources:
  - id: api_health
    status: implemented
    owner_module: api_runtime
    canonical_identifier: api:/health
    storage: ephemeral
    readers:
      - scripts/dev-api.ps1
      - services/api/tests/test_health.py
      - external monitors
    writers:
      - services/api/app/main.py
    states:
      - ok
    contract_refs:
      - contracts/http/api.yaml#getApiHealth

  - id: asr_health
    status: implemented
    owner_module: asr_gateway
    canonical_identifier: asr:/health
    storage: ephemeral
    readers:
      - services/asr/tests/test_asr_bootstrap.py
      - external monitors
    writers:
      - services/asr/app/main.py
    states:
      - ok
    contract_refs:
      - contracts/http/asr.yaml#getAsrHealth

  - id: session
    status: planned
    owner_module: assistant_session_api
    canonical_identifier: sess_<uuid>
    storage:
      source_of_truth: postgres
      cache: redis_optional
    fields:
      required:
        - session_id
        - channel
        - status
        - created_at
        - updated_at
      optional:
        - title
        - created_by
        - metadata
    states:
      - active
      - archived
    transitions:
      - create: active
      - archive: archived
    schema_refs:
      request:
        create: services.api.app.schemas.session.CreateSessionRequest
      responses:
        create: services.api.app.schemas.session.CreateSessionResponse
        detail: services.api.app.schemas.session.GetSessionResponse
    contract_refs:
      - contracts/http/api.yaml#createSession
      - contracts/http/api.yaml#getSession

  - id: conversation_turn
    status: planned
    owner_module: assistant_session_api
    canonical_identifier: turn_<uuid>
    storage:
      source_of_truth: postgres
    fields:
      required:
        - turn_id
        - session_id
        - user_input_type
        - user_input_text
        - task_id
        - created_at
      optional:
        - assistant_output_text
        - citations
        - transcript_text
        - failure_reason
    states:
      - accepted
      - processing
      - completed
      - failed
    schema_refs:
      detail: services.api.app.schemas.session.ConversationTurn
      request:
        submit: services.api.app.schemas.message.SubmitMessageRequest
      responses:
        submit: services.api.app.schemas.message.SubmitMessageResponse
    contract_refs:
      - contracts/http/api.yaml#submitMessage
      - contracts/http/api.yaml#getTask

  - id: knowledge_source
    status: planned
    owner_module: knowledge_ingestion_api
    canonical_identifier: ks_<uuid>
    storage:
      source_of_truth: postgres
    fields:
      required:
        - knowledge_source_id
        - source_type
        - source_locator
        - status
        - created_at
      optional:
        - display_name
        - last_ingested_at
        - failure_reason
    states:
      - draft
      - queued
      - ingesting
      - ready
      - failed
      - disabled
    schema_refs:
      request:
        register: services.api.app.schemas.knowledge_source.RegisterKnowledgeSourceRequest
      responses:
        register: services.api.app.schemas.knowledge_source.RegisterKnowledgeSourceResponse
        detail: services.api.app.schemas.knowledge_source.GetKnowledgeSourceResponse
    contract_refs:
      - contracts/http/api.yaml#registerKnowledgeSource
      - contracts/http/api.yaml#getKnowledgeSource

  - id: assistant_task
    status: planned
    owner_module: worker_orchestrator
    canonical_identifier: task_<uuid>
    storage:
      source_of_truth: postgres
      coordination: redis
    fields:
      required:
        - task_id
        - task_type
        - status
        - created_at
        - updated_at
      optional:
        - session_id
        - knowledge_source_id
        - result_summary
        - error_code
        - error_message
    states:
      - queued
      - running
      - succeeded
      - failed
      - canceled
    schema_refs:
      detail: services.api.app.schemas.task.GetTaskResponse
    contract_refs:
      - contracts/http/api.yaml#getTask
      - contracts/events/worker.yaml#assistant.answer.requested
      - contracts/events/worker.yaml#knowledge.ingestion.requested
      - contracts/events/worker.yaml#asr.transcription.requested

  - id: transcription_request
    status: planned
    owner_module: asr_gateway
    canonical_identifier: tr_<uuid>
    storage:
      source_of_truth: postgres_or_ephemeral_task_payload
    fields:
      required:
        - transcription_request_id
        - input_format
        - status
        - created_at
      optional:
        - transcript_text
        - language_hint
        - provider_name
        - failure_reason
    states:
      - queued
      - running
      - completed
      - failed
    contract_refs:
      - contracts/http/asr.yaml#createTranscription
      - contracts/events/worker.yaml#asr.transcription.requested

  - id: runtime_config_profile
    status: implemented_bootstrap
    owner_module: runtime_config
    canonical_identifier: env:default
    storage:
      source_of_truth: .env_or_process_environment
    fields:
      required:
        - APP_ENV
        - LOG_LEVEL
        - DATABASE_URL
        - REDIS_URL
      optional:
        - LLM_PROVIDER
        - LLM_MODEL
        - OPENAI_API_KEY
        - ASR_PROVIDER
        - AUTH_MODE
    states:
      - loaded
    contract_refs: []
